<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Запись на вождение</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --bg: #f1f5f9; 
            --card-bg: #ffffff; 
            --border: #cbd5e1; 
            --primary: #1d4ed8; 
            --primary-glow: rgba(29, 78, 216, 0.1);
            --success: #065f46; 
            --success-bg: #d1fae5; 
            --danger: #dc2626; 
            --text: #0f172a; 
            --text-muted: #475569; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        .box { background: var(--card-bg); padding: 24px; border-radius: 20px; width: 100%; max-width: 440px; margin-bottom: 20px; box-sizing: border-box; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04); }
        h2 { font-size: 22px; font-weight: 800; text-align: center; margin: 0 0 24px 0; color: var(--text); letter-spacing: -0.5px; }
        h3 { font-size: 18px; margin: 0 0 15px 0; color: var(--text); text-align: center; }
        label { font-size: 13px; font-weight: 700; display: block; margin: 20px 0 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; box-sizing: border-box; font-size: 15px; background: #fff; color: var(--text); transition: 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
        .type-switcher { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 5px; }
        .type-tab { padding: 14px; border: 1px solid var(--border); background: #fff; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; text-align: center; transition: 0.2s; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
        .type-tab.active { border-color: var(--primary) !important; background: #eff6ff !important; color: var(--primary) !important; }
        .level-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .level-card { padding: 14px; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 14px; background: #fff; color: var(--text-muted); transition: 0.2s; }
        .level-card.active { border-color: var(--primary); background: #eff6ff; color: var(--primary); }
        .date-group { margin-top: 20px; }
        .date-header { font-size: 12px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
        .slot-container { display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        /* ИСПРАВЛЕННЫЕ КНОПКИ ВРЕМЕНИ ДЛЯ СВЕТЛОЙ ТЕМЫ */
        .slot-btn { padding: 16px; border: 1px solid #34d399 !important; background: var(--success-bg) !important; color: var(--success) !important; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: 800; text-align: left; display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; transition: 0.2s; }
        .slot-btn span { color: var(--success) !important; }
        .slot-btn.selected { background: var(--primary) !important; border-color: var(--primary) !important; box-shadow: 0 4px 12px rgba(29, 78, 216, 0.2) !important; }
        .slot-btn.selected span { color: #ffffff !important; }
        .slot-btn:disabled { background: #f8fafc !important; border-color: #e2e8f0 !important; color: #cbd5e1 !important; cursor: not-allowed; font-weight: 500; }
        .slot-btn:disabled span { color: #cbd5e1 !important; }
        
        button.submit-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; cursor: pointer; margin-top: 28px; font-weight: 800; transition: 0.2s; }
        button.submit-btn:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
        button.cancel-btn { width: 100%; background: transparent; color: var(--danger); border: 1px solid #fee2e2; padding: 14px; border-radius: 12px; font-size: 15px; cursor: pointer; margin-top: 12px; font-weight: 700; transition: 0.2s; }
        button.cancel-btn:hover { background: #fef2f2; }
        #status, #cancelStatus { margin-top: 15px; padding: 14px; border-radius: 12px; text-align: center; display: none; font-weight: 700; font-size: 14px; }
        .ok { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .err { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }

        /* ИДЕАЛЬНЫЙ СВЕТЛЫЙ АВТОМОБИЛЬНЫЙ МИНИМАЛИЗМ ДЛЯ КАРТОЧЕК */
        .bike-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 15px; }
        .bike-card { display: flex !important; flex-direction: row !important; align-items: center !important; background: #ffffff !important; border: 1px solid var(--border) !important; border-radius: 14px !important; padding: 0 16px 0 0 !important; gap: 16px !important; transition: 0.2s ease-in-out !important; cursor: pointer !important; text-align: left !important; width: 100% !important; box-sizing: border-box !important; margin-bottom: 12px !important; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.03) !important; overflow: hidden !important; }
        .bike-card.active { border-color: var(--primary) !important; background: #eff6ff !important; box-shadow: 0 4px 12px rgba(29, 78, 216, 0.1) !important; }
        .bike-card.disabled { opacity: 0.25 !important; pointer-events: none !important; background: #f8fafc !important; border-color: #e2e8f0 !important; }
        .bike-img { width: 120px !important; height: 100% !important; min-height: 95px !important; object-fit: cover !important; border: none !important; flex-shrink: 0 !important; }
        .bike-info { display: flex !important; flex-direction: column !important; gap: 2px !important; flex: 1 !important; padding: 10px 0 !important; }
        .bike-title { font-family: "Eras Bold ITC", "Eras Demi ITC", "Arial Black", sans-serif !important; font-weight: 900 !important; font-size: 17px !important; color: var(--text) !important; letter-spacing: 0.5px !important; text-transform: uppercase !important; margin: 0 !important; }
        .bike-details { font-size: 12px !important; margin: 0 !important; }
        .bike-details summary { font-family: "JetBrains Mono", "Courier New", monospace !important; color: var(--primary) !important; cursor: pointer !important; font-weight: 700 !important; list-style: none !important; outline: none !important; text-decoration: none !important; display: inline-block !important; letter-spacing: 0.5px !important; margin-top: -2px !important; font-size: 13px !important; text-transform: lowercase !important; }
        .bike-details summary::-webkit-details-marker { display: none !important; }
        .bike-details p { font-family: "Bahnschrift Light SemiCondensed", "Bahnschrift", sans-serif !important; margin: 6px 0 0 0 !important; color: #475569 !important; line-height: 1.4 !important; font-weight: 500 !important; font-size: 13px !important; text-align: left !important; }

        /* ВЕРТИКАЛЬНЫЕ КАРТОЧКИ ИНСТРУКТОРОВ ГРАНИЦА К ГРАНИЦЕ */
        .inst-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .inst-card { display: flex !important; flex-direction: column !important; align-items: stretch !important; justify-content: flex-start !important; background: #ffffff !important; border: 1px solid var(--border) !important; border-radius: 14px !important; padding: 0 0 12px 0 !important; cursor: pointer !important; transition: 0.2s ease-in-out !important; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.02) !important; text-align: center !important; box-sizing: border-box !important; overflow: hidden !important; }
        .inst-card.active { border-color: var(--primary) !important; background: #eff6ff !important; box-shadow: 0 4px 12px rgba(29, 78, 216, 0.1) !important; }
        .inst-img { width: 100% !important; height: 110px !important; object-fit: cover !important; border: none !important; margin-bottom: 10px !important; background: #f1f5f9; flex-shrink: 0 !important; }
        .inst-name { font-family: "Eras Bold ITC", "Eras Demi ITC", "Arial Black", sans-serif !important; font-weight: 900 !important; font-size: 13px !important; color: var(--text) !important; letter-spacing: 0.3px !important; margin-bottom: 2px !important; padding: 0 6px !important; }
        .inst-spec { font-family: "Bahnschrift Light SemiCondensed", "Bahnschrift", sans-serif !important; font-size: 11px !important; color: var(--text-muted) !important; font-weight: 500 !important; padding: 0 6px !important; }
    </style>
</head>
<body>
<div class="box">
    <h2>📅 Запись на вождение</h2>
    <form id="mainForm">
        <label>Ваше Имя и Фамилия:</label>
        <input type="text" id="name" required placeholder="Иван Иванов">
        <label>Email:</label>
        <input type="email" id="email" placeholder="example@gmail.com">
        <label>Телефон:</label>
        <input type="tel" id="phone" required value="+7 " placeholder="+7 (900) 000-00-00">

        <label>Выберите инструктора:</label>
        <div class="inst-grid">
            <div class="inst-card active" id="inst-igor" onclick="setInstructor('Игорь Иванов')">
                <img src="igor.jpg" alt="👨‍🏫" class="inst-img">

<script>
    // ⚠️ ВСТАВЬ СЮДА СВОЮ НОВУЮ ССЫЛКУ /exec ИЗ GOOGLE МЕЖДУ ОДИНАРНЫХ КАВЫЧЕК
    const API_URL = 'https://script.google.com/macros/s/AKfycbyL1B-vFY8UsCeO-wm8hcPc37I83j33jWpwFbY7Xct_AHpY9rBCT_8GR-gS1jS7Vatc/exec';
    
    let globalSlotsData = []; let currentCategory = 'moto';

    // УМНАЯ МАСКА НА РОССИЙСКИЙ НОМЕР ТЕЛЕФОНА
    document.getElementById('phone').addEventListener('input', function(e) {
        let matrix = '+7 (9xx) xxx-xx-xx', i = 0, def = matrix.replace(/\D/g, ""), val = this.value.replace(/\D/g, "");
        if (def.length >= val.length) val = def;
        this.value = matrix.replace(/./g, function(a) { return /[x\d]/.test(a) && i < val.length ? val.charAt(i++) : i >= val.length ? "" : a; });
    });

    document.getElementById('cancelCode').addEventListener('input', function(e) {
        e.target.value = e.target.value.replace(/\D/g, '').substring(0,6);
    });

    function setInstructor(name) {
        document.getElementById('selectedInstructor').value = name;
        document.getElementById('inst-igor').classList.toggle('active', name === 'Игорь Иванов');
        document.getElementById('inst-andrey').classList.toggle('active', name === 'Андрей Гришин');
        const muranoCard = document.getElementById('tab-car_murano_auto');
        if (name === 'Андрей Гришин') { 
            muranoCard.style.display = 'none'; 
            if (document.getElementById('type').value === 'car_murano_auto') setVehicleType('car_granta_manual'); 
        } else { 
            muranoCard.style.display = 'flex'; 
        }
        updateInterface();
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.getElementById('tab-cat-moto').classList.toggle('active', cat === 'moto');
        document.getElementById('tab-cat-car').classList.toggle('active', cat === 'car');
        document.getElementById('motoBikesBlock').style.display = cat === 'moto' ? 'block' : 'none';
        document.getElementById('carVehiclesBlock').style.display = cat === 'car' ? 'block' : 'none';
        if (cat === 'moto') { setBike(document.getElementById('selectedBike').value || 'Bajaj Boxer'); } 
        else { setVehicleType(document.getElementById('type').value.startsWith('car_') ? document.getElementById('type').value : 'car_granta_manual'); }
        updateInterface();
    }

    function setVehicleType(v) {
        document.getElementById('type').value = v;
        document.getElementById('tab-car_granta_manual').classList.toggle('active', v === 'car_granta_manual');
        document.getElementById('tab-car_logan_manual').classList.toggle('active', v === 'car_logan_manual');
        document.getElementById('tab-car_logan_auto').classList.toggle('active', v === 'car_logan_auto');
        document.getElementById('tab-car_murano_auto').classList.toggle('active', v === 'car_murano_auto');
        updateInterface();
    }

    function setBike(b) {
        document.getElementById('type').value = 'moto'; document.getElementById('selectedBike').value = b;
        document.getElementById('bike-boxer').classList.toggle('active', b === 'Bajaj Boxer');
        document.getElementById('bike-fuego').classList.toggle('active', b === 'Fuego Rambolor 250');
        document.getElementById('bike-yamaha').classList.toggle('active', b === 'Yamaha YBR 125');
        updateInterface();
    }

    function setLevel(l) {
        document.getElementById('level').value = l;
        ['green', 'yellow', 'red'].forEach(id => { document.getElementById('lvl-' + id).classList.toggle('active', id === l); });
        updateInterface();
    }

    function loadSlots() {
        const oldScript = document.getElementById('jsonp-slots'); if(oldScript) oldScript.remove();
        const script = document.createElement('script'); script.id = 'jsonp-slots';
        script.src = API_URL + '?callback=renderSlotsData&_t=' + new Date().getTime();
        document.body.appendChild(script);
    }

    function renderSlotsData(slots) { globalSlotsData = slots; updateInterface(); }
    function updateInterface() {
        const type = document.getElementById('type').value; const level = document.getElementById('level').value;
        const currentInst = document.getElementById('selectedInstructor').value; const selectedBike = document.getElementById('selectedBike').value;
        const slotsBox = document.getElementById('slotsBox'); const submitBtn = document.getElementById('submitBtn');
        
        document.getElementById('motoLevelBlock').style.display = currentCategory === 'moto' ? 'block' : 'none'; slotsBox.innerHTML = '';
        const instructorSlots = (globalSlotsData || []).filter(slot => slot.instructor === currentInst);
        
        if (instructorSlots.length === 0) {
            slotsBox.innerHTML = '<div style="text-align: center; color: #64748b; padding: 10px;">Нет свободных слотов</div>';
            submitBtn.disabled = true; return;
        }

        let grouped = {}; instructorSlots.forEach(slot => { if (!grouped[slot.date]) grouped[slot.date] = []; grouped[slot.date].push(slot); });

        Object.keys(grouped).forEach(dateStr => {
            let groupDiv = document.createElement('div'); groupDiv.className = 'date-group';
                        // ИСПРАВЛЕННЫЙ БЛОК ОТОБРАЖЕНИЯ ДАТЫ НА САЙТЕ
            let dateParts = dateStr.split('-'); // Разрезаем строку "2026-07-20" на части
            let months = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
            
            let day = parseInt(dateParts[2], 10);   // Четко берем день (третья часть)
            let monthIdx = parseInt(dateParts[1], 10) - 1; // Четко берем месяц (вторая часть)
            
            let header = document.createElement('div'); 
            header.className = 'date-header'; 
            header.innerText = day + ' ' + months[monthIdx]; // Будет выводить красиво: "20 июл"

            groupDiv.appendChild(header);

            let container = document.createElement('div'); container.className = 'slot-container';
            grouped[dateStr].forEach(slot => {
                let btn = document.createElement('button'); btn.type = 'button'; btn.className = 'slot-btn';
                let timeText = document.createElement('span'); timeText.innerText = slot.time; btn.appendChild(timeText);
                let badge = document.createElement('span'); badge.style.fontSize = '12px'; badge.innerText = 'Свободно'; btn.appendChild(badge);
                
                let isAllowed = true; let isCarType = type.startsWith('car_');
                let targetId = isCarType ? type : selectedBike;

                // СВЕРХТОЧНЫЙ ПОИСК: Если это конкретное железо занято кем-угодно - гасим кнопку!
                let isBusyByAnyone = (slot.bikes || []).some(b => b.toString().trim() === targetId.toString().trim());
                if (isBusyByAnyone) { isAllowed = false; }

                if (isCarType && (slot.car > 0 || slot.totalMoto > 0)) { isAllowed = false; }
                if (!isCarType && type === "moto") {
                    if (slot.totalMoto >= 3 || slot.car > 0) isAllowed = false;
                    if (level === "red" && (slot.red > 0 || slot.yellow > 0 || slot.green > 2)) isAllowed = false;
                    if (level === "yellow" && (slot.red > 0 || slot.yellow >= 2 || (slot.yellow === 1 && slot.green > 1))) isAllowed = false;
                    if (level === "green" && ((slot.red === 1 && slot.green >= 2) || (slot.yellow === 2 && slot.green >= 1))) isAllowed = false;
                }

                if (!isAllowed) { btn.disabled = true; badge.innerText = "Занято"; } 
                else {
                    btn.onclick = function() {
                        document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected');
                        document.getElementById('selectedSlot').value = `${slot.date}|${slot.time}`; submitBtn.disabled = false;
                    };
                }
                container.appendChild(btn);
            });
            groupDiv.appendChild(container); slotsBox.appendChild(groupDiv);
        });
    }

    document.getElementById('mainForm').addEventListener('submit', function(e) {
        e.preventDefault(); const status = document.getElementById('status'); const btn = document.getElementById('submitBtn');
        if (document.getElementById('phone').value.replace(/\D/g, "").length !== 11) {
            status.style.display = 'block'; status.className = 'err'; status.innerText = 'Ошибка: Введите 10 цифр телефона!'; return;
        }
        status.style.display = 'block'; status.className = ''; status.innerText = 'Оформление записи...'; btn.disabled = true;
        const [date, time] = document.getElementById('selectedSlot').value.split('|');
        const name = encodeURIComponent(document.getElementById('name').value.trim());
        const phone = encodeURIComponent("'" + document.getElementById('phone').value.trim());
        const email = encodeURIComponent(document.getElementById('email').value.trim()); const type = document.getElementById('type').value;
        const instructor = encodeURIComponent(document.getElementById('selectedInstructor').value);
        const level = type === 'moto' ? document.getElementById('level').value : 'none';
        const bike = type === 'moto' ? encodeURIComponent(document.getElementById('selectedBike').value) : '';

        const oldScript = document.getElementById('jsonp-booking'); if(oldScript) oldScript.remove();
        const script = document.createElement('script'); script.id = 'jsonp-booking';
        script.src = `${API_URL}?action=book&date=${date}&time=${time}&type=${type}&level=${level}&name=${name}&phone=${phone}&email=${email}&bike=${bike}&instructor=${instructor}&callback=handleBookingResponse`;
        document.body.appendChild(script);
    });

    function handleBookingResponse(response) {
        const status = document.getElementById('status');
        if (response.status === 'success') {
            status.className = 'ok'; status.innerText = response.message; document.getElementById('mainForm').reset();
            document.getElementById('phone').value = "+7 "; setCategory('moto'); loadSlots();
        } else { status.className = 'err'; status.innerText = 'Ошибка: ' + response.message; document.getElementById('submitBtn').disabled = false; }
    }

    function cancelBooking() {
        const code = document.getElementById('cancelCode').value.trim(); const status = document.getElementById('cancelStatus'); if(!code) return;
        status.style.display = 'block'; status.className = ''; status.innerText = 'Отмена занятия...';
        const oldScript = document.getElementById('jsonp-cancel'); if(oldScript) oldScript.remove();
        const script = document.createElement('script'); script.id = 'jsonp-cancel';
        script.src = `${API_URL}?action=cancel&bookingId=${encodeURIComponent(code)}&callback=handleCancelResponse`;
        document.body.appendChild(script);
    }

    function handleCancelResponse(response) {
        const status = document.getElementById('cancelStatus');
        if (response.status === 'success') { status.className = 'ok'; status.innerText = response.message; document.getElementById('cancelCode').value = ''; loadSlots(); } 
        else { status.className = 'err'; status.innerText = response.message; }
    }
    window.onload = loadSlots;
</script>
</body>
</html>
